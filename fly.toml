# Fly.io app configuration for Beep API server
#
# Deploy steps:
# - fly launch --no-deploy
# - fly secrets set SUPABASE_URL=... SUPABASE_SECRET_KEY=...
# - fly deploy

app = "beepcli"
primary_region = "iad"

[env]
  NODE_ENV = "production"
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    interval = "15s"
    timeout = "2s"
    grace_period = "10s"
    method = "GET"
    path = "/"

